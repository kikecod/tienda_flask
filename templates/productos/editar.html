<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edita tu producto</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        input { width: 100%; padding: 9px; margin: 6px 0 16px; border: 1px solid #ccc;
                border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #f0ad4e; color: white;
                 border: none; border-radius: 4px; cursor: pointer; }
        a { color: #4a90e2; }
    </style>
</head>
<body>
    <h2>Editar producto {{ producto.nombre }}</h2>

    <form action="/editar/{{ producto.id }}" method="POST">
        <label for="">Nombre</label>
        <input type="text" name="nombre" value="{{ producto.nombre }}"><br>
        <label for="">Precio</label>
        <input type="number" name="precio" value="{{ producto.precio }}"><br>
        <label for="">Stock</label>
        <input type="number" name="stock" value="{{ producto.stock }}"><br>

        <button type="submit" >Actualizar</button>
        <a href="/">Cancelar</a>
    </form>
</body>
</html>
